<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="متابعة العيوب" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="theme-color" content="#3b82f6" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>تسجيل عيب - نظام تسجيل العيوب</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #0f172a; padding: 20px; color: #f1f5f9; }
.container { max-width: 600px; margin: 0 auto; }
.sub-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #1e293b; padding: 14px 20px; border-radius: 12px; }
.back-link { color: #93c5fd; text-decoration: none; font-weight: 600; font-size: 14px; }
.back-link:hover { text-decoration: underline; }

.view { background: #1e293b; border-radius: 16px; padding: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.view h1 { text-align: center; color: #60a5fa; margin-bottom: 24px; font-size: 22px; }

label { color: #cbd5e1; display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
input, select, textarea { width: 100%; padding: 12px 14px; margin-bottom: 18px; border: none; border-radius: 8px; background: #334155; color: #f1f5f9; font-size: 15px; }
input:focus, select:focus, textarea:focus { outline: 2px solid #3b82f6; }
textarea { resize: vertical; min-height: 80px; }

.scan-row { display: flex; gap: 10px; margin-bottom: 18px; }
.scan-row input { margin-bottom: 0; flex: 1; }
.scan-btn { background: #8b5cf6; color: white; border: none; padding: 0 18px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }
.scan-btn:hover { background: #7c3aed; }

.job-order-preview { background: #0f172a; border-radius: 8px; padding: 10px 14px; margin: -10px 0 18px; color: #fbbf24; font-size: 13px; font-weight: bold; display: none; }

#scannerModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
#scannerModal.open { display: flex; }
.scanner-box { background: #1e293b; border-radius: 14px; padding: 20px; width: 90%; max-width: 400px; }
.scanner-box h3 { color: #60a5fa; margin-bottom: 14px; text-align: center; }
#scannerContainer { width: 100%; border-radius: 10px; overflow: hidden; }
.scanner-close { width: 100%; margin-top: 14px; padding: 10px; background: #64748b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
.scanner-close:hover { background: #475569; }

.btn-submit { width: 100%; padding: 14px; background: #22c55e; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; }
.btn-submit:hover { background: #16a34a; }
.btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
.msg { padding: 12px; border-radius: 8px; text-align: center; margin-top: 16px; display: none; font-weight: bold; }
.msg-success { background: #22c55e; color: white; }
.msg-error { background: #ef4444; color: white; }
</style>
</head>
<body>
<div class="container">
<div class="sub-header">
<a href="home.html" class="back-link" data-i18n="home">⬅ الرئيسية</a>
<div style="display:flex; align-items:center; gap:10px;">
<div id="notifBellWrap"></div>
<div id="langToggleWrap"></div>
<span id="userEmail" style="color:#94a3b8; font-size:13px;"></span>
</div>
</div>

<div id="pendingBadgeWrap"></div>
<div id="diagnosticsWrap" style="margin-bottom:16px;"></div>

<div class="view">
<h1 data-i18n="register_defect_title">🔍 تسجيل عيب جديد</h1>
<form id="defectForm">

<label data-i18n="serial_label">السيريال</label>
<div class="scan-row">
  <input type="text" id="serialInput" placeholder="اكتب السيريال أو استخدم السكانر" required />
  <button type="button" class="scan-btn" id="openScannerBtn" data-i18n="scan_btn">📷 سكان</button>
</div>
<div class="job-order-preview" id="jobOrderPreview"></div>
<div id="defectCodePreview" style="color:#fb923c; font-size:12px; font-weight:bold; margin:-10px 0 18px; display:none;"></div>
<div id="defectCodePreview" style="color:#fb923c; font-size:12px; font-weight:bold; margin:-10px 0 18px; display:none;"></div>

<div id="stageFieldWrap">
<label data-i18n="stage_label">محطة الفحص</label>
<select id="stageSelect" required>
  <option value="">⏳ جاري تحميل المحطات...</option>
</select>
</div>

<label data-i18n="defect_type_label">نوع العيب</label>
<select id="defectTypeSelect">
  <option value="">-- اختر نوع العيب (اختياري) --</option>
</select>

<label data-i18n="description_label">وصف العيب (اختياري)</label>
<textarea id="descriptionInput" placeholder="اكتب تفاصيل إضافية عن العيب..."></textarea>

<label>📷 صورة العيب (اختياري)</label>
<input type="file" id="photoInput" accept="image/*" capture="environment" style="width:100%; padding:10px; margin-bottom:8px; border:none; border-radius:8px; background:#334155; color:#f1f5f9; font-size:13px;" />
<div id="photoPreviewWrap" style="display:none; margin-bottom:18px;">
  <img id="photoPreview" style="max-width:100%; max-height:200px; border-radius:8px;" />
  <div id="photoSizeInfo" style="color:#64748b; font-size:11px; margin-top:4px;"></div>
</div>

<button type="submit" class="btn-submit" id="submitBtn" data-i18n="submit_defect_btn">✅ تسجيل العيب</button>
</form>
<div id="successMsg" class="msg msg-success">✅ تم تسجيل العيب بنجاح!</div>
<div id="errorMsg" class="msg msg-error"></div>
</div>
</div>

<div id="scannerModal">
<div class="scanner-box">
<h3>📷 وجّه الكاميرا نحو الباركود</h3>
<div id="scannerContainer"></div>
<button class="scanner-close" id="closeScannerBtn">إغلاق</button>
</div>
</div>

<script src="shared.js"></script>
<script>
let currentUser = null;
let currentRole = null;
let currentScanner = null;
let compressedPhotoBlob = null;
let singleAllowedStageId = null; // لو الحساب متخصص بمحطة واحدة بس، بنحفظ الـ id هنا

// ضغط الصورة تلقائيًا باستخدام Canvas (أقصى بعد 1280px، جودة JPEG 70%)
function compressImage(file, maxDimension = 1280, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const reader = new FileReader();
    reader.onload = (e) => { img.src = e.target.result; };
    reader.onerror = reject;
    img.onload = () => {
      let { width, height } = img;
      if (width > height && width > maxDimension) {
        height = Math.round(height * (maxDimension / width));
        width = maxDimension;
      } else if (height > maxDimension) {
        width = Math.round(width * (maxDimension / height));
        height = maxDimension;
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, width, height);
      canvas.toBlob((blob) => resolve(blob), 'image/jpeg', quality);
    };
    img.onerror = reject;
    reader.readAsDataURL(file);
  });
}

document.getElementById('photoInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) { compressedPhotoBlob = null; document.getElementById('photoPreviewWrap').style.display = 'none'; return; }

  const originalSizeKB = Math.round(file.size / 1024);
  document.getElementById('photoSizeInfo').textContent = '⏳ جاري ضغط الصورة...';
  document.getElementById('photoPreviewWrap').style.display = 'block';

  try {
    compressedPhotoBlob = await compressImage(file);
    const compressedSizeKB = Math.round(compressedPhotoBlob.size / 1024);
    document.getElementById('photoPreview').src = URL.createObjectURL(compressedPhotoBlob);
    document.getElementById('photoSizeInfo').textContent =
      `📦 الحجم الأصلي: ${originalSizeKB} كيلو ← بعد الضغط: ${compressedSizeKB} كيلو`;
  } catch (err) {
    console.error('فشل ضغط الصورة:', err);
    compressedPhotoBlob = file; // لو فشل الضغط، نرفع الأصلية
    document.getElementById('photoSizeInfo').textContent = '⚠️ لم يتم الضغط، سيتم رفع الصورة الأصلية';
  }
});

// تصفير خانات الفورم بعد كل تسجيل - بشكل يدوي ومحدد (بدل form.reset() الجارف)
// عشان منلمسش قائمة المحطات المحمّلة بالفعل (كانت بترجع لحالة "جاري التحميل" في بعض المتصفحات)
function resetFormFieldsOnly() {
  document.getElementById('serialInput').value = '';
  document.getElementById('descriptionInput').value = '';
  document.getElementById('photoInput').value = '';
}

async function init() {
  applyTranslations();
  renderLangToggle('langToggleWrap');
  renderPendingBadge('pendingBadgeWrap');
  renderDiagnosticsPanel('diagnosticsWrap');
  const auth = await requireAuth();
  if (!auth) return;
  currentUser = auth.user;
  currentRole = auth.role;
  document.getElementById('userEmail').textContent = auth.user.email;
  renderNotificationBell('notifBellWrap', auth.user.id);
  syncFormDataForOffline(); // نسخة خفيفة (محطات + أنواع عيوب بس) عشان الصفحة متبطأش
  loadStages();
  makeSelectSearchable('stageSelect');
  makeSelectSearchable('defectTypeSelect');

  // نحط المؤشر في خانة السيريال مباشرة عشان يقدر يسكن بالباركود ريدر
  // أو يكتب فورًا من غير ما يحتاج يدوس على الخانة يدوي
  document.getElementById('serialInput').focus();
}
init();

async function loadStages() {
  const select = document.getElementById('stageSelect');

  // نعرض النسخة المحفوظة محليًا فورًا (لو موجودة) قبل أي محاولة شبكة
  // عشان الفني ميستناش ثواني لحد ما الشبكة تفشل لو النت بطيء أو مقطوع فعليًا
  const initialCached = getCachedStages();
  if (initialCached.length > 0) {
    console.log('⚡ عرض فوري للمحطات من الكاش:', initialCached.length);
    renderStagesOptions(initialCached);
  }

  try {
    const { data, error } = await sbClient.from('stages').select('*').order('name');
    if (error) throw error;

    // فلترة موحّدة (نفس الدالة المستخدمة في shared.js عند حفظ نسخة أوفلاين)
    // عشان منحصلش على نتيجة مختلفة هنا عن اللي بيتحفظ للعمل بدون نت
    let allowedStages = await getFilteredStagesForUser(data);
    // الأدمن والمشرف العام يقدروا يسجلوا عيوب لأي محطة من غير تقييد دايمًا (الدالة بتراعي ده تلقائيًا)

    cacheStages(allowedStages);
    renderStagesOptions(allowedStages);
  } catch (err) {
    const cached = getCachedStages();
    if (cached.length > 0) {
      renderStagesOptions(cached);
    } else {
      select.innerHTML = '<option value="">📭 لا توجد محطات محفوظة محليًا، محتاج تفتح الصفحة مرة على الأقل وأنت متصل بالنت</option>';
    }
  }
}

function renderStagesOptions(data) {
  const select = document.getElementById('stageSelect');
  const wrap = document.getElementById('stageFieldWrap');

  if (!data || data.length === 0) {
    wrap.style.display = 'block';
    select.innerHTML = '<option value="">📭 لا توجد محطات مضافة بعد</option>';
    return;
  }

  select.innerHTML = '<option value="">-- اختر محطة الفحص --</option>';
  data.forEach(s => {
    const o = document.createElement('option');
    o.value = s.id;
    o.textContent = s.name + (s.line_no ? ' (خط ' + s.line_no + ')' : '');
    select.appendChild(o);
  });
  refreshSearchableSelect('stageSelect');

  // لو الحساب متخصص بمحطة واحدة بس، نختارها تلقائيًا ونخفي خانة الاختيار
  // عشان الفني يروح مباشرة لاختيار نوع العيب من غير خطوة زيادة
  if (data.length === 1) {
    singleAllowedStageId = data[0].id;
    select.value = data[0].id;
    wrap.style.display = 'none';
    refreshSearchableSelect('stageSelect');
    loadDefectTypesForStage(data[0].id);
  } else {
    singleAllowedStageId = null;
    wrap.style.display = 'block';
  }
}

async function loadDefectTypesForStage(stageId) {
  const dtSelect = document.getElementById('defectTypeSelect');
  dtSelect.innerHTML = '<option value="">-- اختر نوع العيب (اختياري) --</option>';
  if (!stageId) return;

  // نعرض النسخة المحفوظة محليًا فورًا (لو موجودة) - من غير أي انتظار خالص
  // بغض النظر عن navigator.onLine (اللي ممكن يكون غير دقيق أحيانًا)
  const cached = getCachedDefectTypes(stageId);
  if (cached.length > 0) {
    console.log('⚡ عرض فوري من الكاش:', cached.length, 'نوع عيب');
    renderDefectTypeOptions(cached);
    refreshSearchableSelect('defectTypeSelect');
  }

  // بعد كده، لو فيه نت فعلاً، نحاول نجيب نسخة أحدث في الخلفية من غير ما نعطّل المستخدم
  if (!navigator.onLine) {
    if (cached.length === 0) {
      dtSelect.innerHTML += '<option value="" disabled>⚠️ لا توجد أنواع عيوب محفوظة محليًا لهذه المحطة</option>';
    }
    return;
  }

  try {
    const { data, error } = await sbClient.from('defect_types').select('*').eq('stage_id', stageId).order('name');
    if (error) throw error;
    console.log('✅ تم تحديث أنواع العيوب من النت في الخلفية:', data.length);
    cacheDefectTypes(stageId, data);
    // نحدّث القائمة بس لو المستخدم لسه واقف على نفس المحطة (منغيرش تحته وهو بيختار)
    if (document.getElementById('stageSelect').value === stageId) {
      dtSelect.innerHTML = '<option value="">-- اختر نوع العيب (اختياري) --</option>';
      renderDefectTypeOptions(data);
      refreshSearchableSelect('defectTypeSelect');
    }
  } catch (err) {
    console.warn('⚠️ فشل تحديث أنواع العيوب من النت في الخلفية (مش مشكلة، عندنا نسخة محفوظة أصلاً):', err);
    if (cached.length === 0) {
      dtSelect.innerHTML += '<option value="" disabled>⚠️ لا توجد أنواع عيوب محفوظة محليًا لهذه المحطة</option>';
    }
  }
}

document.getElementById('stageSelect').addEventListener('change', (e) => {
  loadDefectTypesForStage(e.target.value);
});

function renderDefectTypeOptions(data) {
  const dtSelect = document.getElementById('defectTypeSelect');
  (data || []).forEach(dt => {
    const o = document.createElement('option');
    o.value = dt.id;
    o.textContent = dt.name;
    o.dataset.name = dt.name;
    dtSelect.appendChild(o);
  });
}

// معاينة الجوب أوردر لحظيًا
let currentDefectCode = null;

document.getElementById('serialInput').addEventListener('input', (e) => {
  const preview = document.getElementById('jobOrderPreview');
  const jo = extractJobOrder(e.target.value.trim());
  if (jo) {
    preview.textContent = '🔢 الجوب أوردر: ' + jo;
    preview.style.display = 'block';
  } else {
    preview.style.display = 'none';
  }

  // نولّد كود العيب فور ما السيريال يتحدد (سكان أو كتابة يدوية)، مرة واحدة بس لكل تسجيل
  // عشان يفضل ثابت حتى لو الفني عدّل حاجات تانية في الفورم قبل ما يدوس تسجيل
  const codePreview = document.getElementById('defectCodePreview');
  if (e.target.value.trim() && !currentDefectCode) {
    currentDefectCode = generateDefectCode(getCachedUserCode());
    codePreview.textContent = '🏷️ كود العيب: ' + currentDefectCode;
    codePreview.style.display = 'block';
  } else if (!e.target.value.trim()) {
    currentDefectCode = null;
    codePreview.style.display = 'none';
  }
});

// ============ سكان الباركود ============
const scannerModal = document.getElementById('scannerModal');
document.getElementById('openScannerBtn').addEventListener('click', () => {
  scannerModal.classList.add('open');
  currentScanner = startBarcodeScanner('scannerContainer', (decodedText) => {
    document.getElementById('serialInput').value = decodedText;
    document.getElementById('serialInput').dispatchEvent(new Event('input'));
    closeScannerModal();
  }, (err) => {
    console.error('Scanner error:', err);
  });
});

async function closeScannerModal() {
  scannerModal.classList.remove('open');
  if (currentScanner) {
    await currentScanner.stop();
    currentScanner = null;
  }
}
document.getElementById('closeScannerBtn').addEventListener('click', closeScannerModal);

// ============ إرسال الفورم ============
document.getElementById('defectForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  const successMsg = document.getElementById('successMsg');
  const errorMsg = document.getElementById('errorMsg');
  successMsg.style.display = 'none';
  errorMsg.style.display = 'none';
  btn.disabled = true;
  btn.textContent = '⏳ جاري الحفظ...';

  const serial = document.getElementById('serialInput').value.trim();
  const stageId = document.getElementById('stageSelect').value;
  const dtSelect = document.getElementById('defectTypeSelect');
  const defectTypeId = dtSelect.value || null;
  const defectTypeName = dtSelect.value ? dtSelect.selectedOptions[0].dataset.name : null;
  const description = document.getElementById('descriptionInput').value.trim() || null;

  const defectPayload = {
    serial_number: serial,
    stage_id: stageId,
    defect_type_id: defectTypeId,
    defect_type_name: defectTypeName,
    description,
    technician_id: currentUser.id,
    technician_email: currentUser.email,
    // كود العيب اتولّد فور سحب السيريال (أو دلوقتي كحل احتياطي لو لأي سبب ما اتولدش)
    defect_code: currentDefectCode || generateDefectCode(getCachedUserCode()),
  };

  // تحقق من وجود عيوب مسجلة قبل كده بنفس التفاصيل (سيريال + محطة + نوع العيب)
  // ده مجرد تنبيه، مش مانع - الفني يقدر يكمل التسجيل عادي بعد ما يشوف الرسالة
  if (navigator.onLine) {
    try {
      let dupQuery = sbClient.from('defects').select('id', { count: 'exact', head: true })
        .eq('serial_number', serial)
        .eq('stage_id', stageId);
      dupQuery = defectTypeId ? dupQuery.eq('defect_type_id', defectTypeId) : dupQuery.is('defect_type_id', null);

      const { count } = await dupQuery;
      if (count && count > 0) {
        alert(`⚠️ تنبيه: تم تسجيل هذا العيب مسبقًا ${count} مرة بنفس السيريال والمحطة ونوع العيب. سيتم تسجيله مجددًا بشكل طبيعي.`);
      }
    } catch (err) {
      console.warn('فشل فحص التكرار (تجاهل واستمر):', err);
    }
  }

  // رفع الصورة أولاً لو موجودة ومتصل بالنت (الصور مش مدعومة أوفلاين حاليًا)
  if (compressedPhotoBlob && navigator.onLine) {
    try {
      const fileName = `${currentUser.id}_${Date.now()}.jpg`;
      const { error: uploadError } = await sbClient.storage
        .from('defect-photos')
        .upload(fileName, compressedPhotoBlob, { contentType: 'image/jpeg' });

      if (!uploadError) {
        const { data: urlData } = sbClient.storage.from('defect-photos').getPublicUrl(fileName);
        defectPayload.photo_url = urlData.publicUrl;
      } else {
        console.warn('فشل رفع الصورة، سيتم تسجيل العيب بدونها:', uploadError);
      }
    } catch (err) {
      console.warn('فشل رفع الصورة، سيتم تسجيل العيب بدونها:', err);
    }
  }

  try {
    if (!navigator.onLine) {
      // مفيش نت خالص - احفظ محليًا فورًا من غير ما نحاول أصلاً
      throw new Error('offline');
    }

    const { data: insertedData, error } = await sbClient.from('defects').insert([defectPayload]).select('defect_code').single();
    if (error) throw error;

    successMsg.textContent = insertedData?.defect_code
      ? `✅ تم تسجيل العيب بنجاح! كود العيب: ${insertedData.defect_code}`
      : '✅ تم تسجيل العيب بنجاح!';
    successMsg.style.display = 'block';
    resetFormFieldsOnly(); compressedPhotoBlob = null; currentDefectCode = null; document.getElementById('photoPreviewWrap').style.display = 'none'; const nextStageId = singleAllowedStageId || ''; document.getElementById('stageSelect').value = nextStageId; loadDefectTypesForStage(nextStageId); document.getElementById('serialInput').focus();
    document.getElementById('jobOrderPreview').style.display = 'none';
    document.getElementById('defectTypeSelect').innerHTML = '<option value="">-- اختر نوع العيب (اختياري) --</option>';
    setTimeout(() => { successMsg.style.display = 'none'; }, 4000);
  } catch (err) {
    // فشل الإرسال (غالبًا لانقطاع النت) - احفظ العيب محليًا للمزامنة لاحقًا
    queueDefectOffline(defectPayload);
    successMsg.textContent = '📴 لا يوجد اتصال بالإنترنت حاليًا. تم حفظ العيب محليًا وسيتم رفعه تلقائيًا عند عودة الاتصال.';
    successMsg.style.display = 'block';
    resetFormFieldsOnly(); compressedPhotoBlob = null; currentDefectCode = null; document.getElementById('photoPreviewWrap').style.display = 'none'; const nextStageId = singleAllowedStageId || ''; document.getElementById('stageSelect').value = nextStageId; loadDefectTypesForStage(nextStageId); document.getElementById('serialInput').focus();
    document.getElementById('jobOrderPreview').style.display = 'none';
    document.getElementById('defectTypeSelect').innerHTML = '<option value="">-- اختر نوع العيب (اختياري) --</option>';
    renderPendingBadge('pendingBadgeWrap');
    setTimeout(() => { successMsg.style.display = 'none'; }, 6000);
    console.warn('Saved offline due to:', err);
