<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>إعادة تعيين كلمة المرور</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
.box { background: #1e293b; padding: 36px; border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); width: 100%; max-width: 400px; }
.box h2 { color: #f8fafc; text-align: center; margin-bottom: 8px; font-size: 24px; }
.sub { color: #94a3b8; text-align: center; margin-bottom: 24px; font-size: 13px; }
label { color: #cbd5e1; display: block; margin-bottom: 6px; font-weight: 600; font-size: 14px; }
input { width: 100%; padding: 12px 16px; margin-bottom: 18px; border: none; border-radius: 8px; background: #334155; color: #f1f5f9; font-size: 15px; }
input:focus { outline: 2px solid #3b82f6; }
button[type="submit"] { width: 100%; padding: 14px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 17px; font-weight: bold; cursor: pointer; }
button[type="submit"]:hover { background: #2563eb; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.error-msg { color: #f87171; text-align: center; margin-top: 12px; font-size: 14px; }
.success-msg { color: #4ade80; text-align: center; margin-top: 12px; font-size: 14px; }
.login-link { display:block; text-align:center; color:#93c5fd; text-decoration:none; margin-top:16px; font-size:14px; }
.login-link:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="box">
<h2>🔑 إعادة تعيين كلمة المرور</h2>
<div class="sub" id="statusLabel">⏳ جاري التحقق من الرابط...</div>

<form id="resetForm" style="display:none;">
<label>كلمة المرور الجديدة</label>
<input type="password" id="newPassword" placeholder="••••••••" minlength="6" required />
<label>تأكيد كلمة المرور الجديدة</label>
<input type="password" id="confirmPassword" placeholder="••••••••" minlength="6" required />
<button type="submit" id="submitBtn">تحديث كلمة المرور</button>
<div id="errorMsg" class="error-msg"></div>
<div id="successMsg" class="success-msg"></div>
</form>

<a href="index.html" class="login-link">⬅ رجوع لتسجيل الدخول</a>
</div>

<script>
const SUPABASE_URL = "https://igdfaqiaprhgsdrqcxfj.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_2Vw18qr3DeAt7Ge7onvXLA_Gr02sm2e";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// لما المستخدم يفتح اللينك اللي جاله بالإيميل، مكتبة supabase-js
// بتتعرف تلقائيًا على التوكن الموجود في الرابط وتنشئ "recovery session"
async function init() {
  const statusLabel = document.getElementById('statusLabel');
  const resetForm = document.getElementById('resetForm');

  // ننتظر شوية عشان المكتبة تعالج الرابط (hash) وتنشئ الجلسة
  const { data: { session } } = await client.auth.getSession();

  if (session) {
    statusLabel.textContent = '✅ الرابط صالح، اكتب كلمة المرور الجديدة:';
    resetForm.style.display = 'block';
  } else {
    statusLabel.textContent = '❌ الرابط غير صالح أو منتهي الصلاحية. اطلب رابط جديد من صفحة تسجيل الدخول.';
  }
}

client.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('statusLabel').textContent = '✅ الرابط صالح، اكتب كلمة المرور الجديدة:';
    document.getElementById('resetForm').style.display = 'block';
  }
});

init();

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const btn = document.getElementById('submitBtn');
  errorMsg.textContent = '';
  successMsg.textContent = '';

  if (newPassword !== confirmPassword) {
    errorMsg.textContent = '❌ كلمتا المرور غير متطابقتين';
    return;
  }

  btn.disabled = true;
  btn.textContent = '⏳ جاري التحديث...';

  try {
    const { error } = await client.auth.updateUser({ password: newPassword });
    if (error) throw error;

    successMsg.textContent = '✅ تم تغيير كلمة المرور بنجاح! جاري تحويلك لتسجيل الدخول...';
    document.getElementById('resetForm').reset();
    setTimeout(() => {
      client.auth.signOut().then(() => { window.location.href = 'index.html'; });
    }, 2000);
  } catch (err) {
    errorMsg.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false;
    btn.textContent = 'تحديث كلمة المرور';
  }
});
</script>
</body>
</html>
