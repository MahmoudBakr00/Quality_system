<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="متابعة العيوب" />
<link rel="apple-touch-icon" href="icon-180.png" />
<meta name="theme-color" content="#3b82f6" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>إصلاح الأعطال - نظام تسجيل العيوب</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { background: #0f172a; padding: 20px; color: #f1f5f9; }
.container { max-width: 650px; margin: 0 auto; }
.sub-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: #1e293b; padding: 14px 20px; border-radius: 12px; }
.back-link { color: #93c5fd; text-decoration: none; font-weight: 600; font-size: 14px; }
.back-link:hover { text-decoration: underline; }

.view { background: #1e293b; border-radius: 16px; padding: 28px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
.view h1 { text-align: center; color: #60a5fa; margin-bottom: 24px; font-size: 22px; }

.scan-row { display: flex; gap: 10px; margin-bottom: 8px; }
.scan-row input { flex: 1; padding: 12px 14px; border: none; border-radius: 8px; background: #334155; color: #f1f5f9; font-size: 15px; }
.scan-row input:focus { outline: 2px solid #3b82f6; }
.scan-btn { background: #8b5cf6; color: white; border: none; padding: 0 18px; border-radius: 8px; cursor: pointer; font-weight: bold; white-space: nowrap; }
.scan-btn:hover { background: #7c3aed; }
.search-btn { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; margin-top: 6px; }
.search-btn:hover { background: #2563eb; }

#scannerModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
#scannerModal.open { display: flex; }
.scanner-box { background: #1e293b; border-radius: 14px; padding: 20px; width: 90%; max-width: 400px; }
.scanner-box h3 { color: #60a5fa; margin-bottom: 14px; text-align: center; }
#scannerContainer { width: 100%; border-radius: 10px; overflow: hidden; }
.scanner-close { width: 100%; margin-top: 14px; padding: 10px; background: #64748b; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

.result-panel { background: #1e293b; border-radius: 14px; padding: 24px; margin-top: 20px; }
.result-panel h2 { color: #60a5fa; font-size: 16px; margin-bottom: 16px; }

.defect-card { background: #334155; border-radius: 10px; padding: 14px 18px; margin-bottom: 10px; }
.defect-card .top-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
.defect-card .code { font-weight: bold; color: #93c5fd; }
.defect-card .type { color: #f1f5f9; font-size: 14px; margin-bottom: 4px; }
.defect-card .desc { color: #94a3b8; font-size: 12px; margin-bottom: 8px; }
.repair-btn { width: 100%; padding: 10px; background: #22c55e; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
.repair-btn:hover { background: #16a34a; }
.repair-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.repair-status-badge { font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: bold; }
.repair-status-badge.pending_review { background: #fbbf24; color: #78350f; }
.repair-status-badge.confirmed { background: #22c55e; color: white; }
.repair-status-badge.rejected { background: #ef4444; color: white; }

.empty-note { color: #64748b; text-align: center; padding: 30px; }
</style>
</head>
<body>
<div class="container">
<div class="sub-header">
<a href="home.html" class="back-link">⬅ الرئيسية</a>
<div style="display:flex; align-items:center; gap:10px;">
<div id="notifBellWrap"></div>
<div id="langToggleWrap"></div>
<span id="userEmail" style="color:#94a3b8; font-size:13px;"></span>
</div>
</div>

<div class="view">
<h1>🔧 تسجيل إصلاح عطل</h1>
<div class="scan-row">
  <input type="text" id="serialInput" placeholder="اكتب السيريال أو استخدم السكانر" />
  <button type="button" class="scan-btn" id="openScannerBtn">📷 سكان</button>
</div>
<button class="search-btn" id="searchBtn">🔍 عرض الأعطال المسجلة</button>
</div>

<div class="result-panel" id="resultPanel" style="display:none;">
<h2 id="resultTitle">الأعطال المسجلة على هذا المنتج</h2>
<div id="defectsList"></div>
</div>
</div>

<div id="scannerModal">
<div class="scanner-box">
<h3>📷 وجّه الكاميرا نحو الباركود</h3>
<div id="scannerContainer"></div>
<button class="scanner-close" id="closeScannerBtn">إغلاق</button>
</div>
</div>

<script src="shared.js"></script>
<script>
let currentUser = null;
let currentScanner = null;

async function init() {
  applyTranslations();
  renderLangToggle('langToggleWrap');
  const auth = await requireAuth();
  if (!auth) return;
  currentUser = auth.user;
  document.getElementById('userEmail').textContent = auth.user.email;
  renderNotificationBell('notifBellWrap', auth.user.id);
  document.getElementById('serialInput').focus();
}
init();

const scannerModal = document.getElementById('scannerModal');
document.getElementById('openScannerBtn').addEventListener('click', () => {
  scannerModal.classList.add('open');
  currentScanner = startBarcodeScanner('scannerContainer', (decodedText) => {
    document.getElementById('serialInput').value = decodedText;
    closeScannerModal();
    searchDefects();
  }, (err) => console.error('Scanner error:', err));
});

async function closeScannerModal() {
  scannerModal.classList.remove('open');
  if (currentScanner) { await currentScanner.stop(); currentScanner = null; }
}
document.getElementById('closeScannerBtn').addEventListener('click', closeScannerModal);

document.getElementById('searchBtn').addEventListener('click', searchDefects);
document.getElementById('serialInput').addEventListener('keypress', (e) => {
  if (e.key === 'Enter') searchDefects();
});

const repairStatusText = { pending_review: '⏳ في انتظار مراجعة الإصلاح', confirmed: '✅ تم تأكيد الإصلاح', rejected: '✖ تم رفض الإصلاح' };

async function searchDefects() {
  const serial = document.getElementById('serialInput').value.trim();
  if (!serial) return;

  const resultPanel = document.getElementById('resultPanel');
  const list = document.getElementById('defectsList');
  resultPanel.style.display = 'block';
  list.innerHTML = '<div class="empty-note">⏳ جاري البحث...</div>';

  document.getElementById('resultTitle').textContent = 'الأعطال المسجلة على السيريال: ' + serial;

  const { data, error } = await sbClient
    .from('defects')
    .select('*, stages(name)')
    .eq('serial_number', serial)
    .eq('status', 'approved')
    .order('created_at', { ascending: false });

  if (error) {
    list.innerHTML = '<div class="empty-note">❌ حدث خطأ أثناء البحث</div>';
    return;
  }

  if (!data || data.length === 0) {
    list.innerHTML = '<div class="empty-note">✅ لا توجد أعطال معتمدة تحتاج إصلاح على هذا المنتج</div>';
    return;
  }

  list.innerHTML = data.map(d => `
    <div class="defect-card">
      <div class="top-row">
        <span class="code">${d.defect_code || '-'}</span>
        ${d.repair_status ? `<span class="repair-status-badge ${d.repair_status}">${repairStatusText[d.repair_status]}</span>` : ''}
      </div>
      <div class="type">${d.defect_type_name || 'بدون نوع محدد'} — ${d.stages ? d.stages.name : '-'}</div>
      ${d.description ? `<div class="desc">${d.description}</div>` : ''}
      ${(!d.repair_status || d.repair_status === 'rejected') ? `<button class="repair-btn" data-id="${d.id}">✅ تم الإصلاح</button>` : ''}
    </div>
  `).join('');

  list.querySelectorAll('.repair-btn').forEach(btn => {
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      btn.textContent = '⏳ جاري التسجيل...';
      const { error } = await sbClient.rpc('mark_defect_repaired', { p_defect_id: btn.dataset.id });
      if (error) {
        alert('❌ فشل تسجيل الإصلاح: ' + error.message);
        btn.disabled = false;
        btn.textContent = '✅ تم الإصلاح';
        return;
      }
      alert('✅ تم تسجيل الإصلاح بنجاح، وتم إرسال إشعار للمراجعة');
      searchDefects();
    });
  });
}
</script>
</body>
</html>
